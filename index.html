<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Comidas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Menu Delicioso</h1>
    <p>Clique nas imagens para expandir!</p>

    <div class="gallery">
        <a href="#cachorro-quente"><img src="https://images.unsplash.com/photo-1619740455993-9e612b1af08a?w=400" alt="Cachorro Quente"></a>
        <a href="#pizza"><img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=400" alt="Pizza"></a>
        <a href="#bolo"><img src="https://images.unsplash.com/photo-1578985545062-69928b1ea9c2?w=400" alt="Bolo"></a>
    </div>

    <div id="cachorro-quente" class="modal">
        <a href="#" class="close-btn">&times;</a>
        <img src="https://images.unsplash.com/photo-1619740455993-9e612b1af08a?w=800" alt="Cachorro Quente Expandido">
    </div>

    <div id="pizza" class="modal">
        <a href="#" class="close-btn">&times;</a>
        <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=800" alt="Pizza Expandida">
    </div>

    <div id="bolo" class="modal">
        <a href="#" class="close-btn">&times;</a>
        <img src="https://images.unsplash.com/photo-1578985545062-69928b1ea9c2?w=800" alt="Bolo Expandido">
    </div>

</body>
</html>
