<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Comidas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Menu Delicioso</h1>
    <p>Clique nas imagens para expandir!</p>

    <div class="gallery">
        <img class="img-galeria" src="https://images.unsplash.com/photo-1619740455993-9e612b1af08a?w=400" alt="Cachorro Quente Delicioso">
        <img class="img-galeria" src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=400" alt="Pizza de Pepperoni">
        <img class="img-galeria" src="https://images.unsplash.com/photo-1551024506-0bc973807288?w=400" alt="Bolo com Morangos">
    </div>

    <div id="meuModal" class="modal">
        <span class="close-btn">&times;</span>
        <img class="modal-content" id="imgExpandida">
        <div id="legenda"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
